# Netlify build + functions config
[build]
  command = "npm run build"
  publish = "_site"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Old lead form retired — send it (and any legacy variants) to the current quote form.
[[redirects]]
  from = "/enquire/"
  to = "/get-a-quote/"
  status = 301
  force = true

